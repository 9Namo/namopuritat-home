<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puritat Kampamai | ภูริทัต คำพมัย</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: '#030303', light: '#fcfcfc' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            transition: background-color 0.5s ease;
            -webkit-font-smoothing: antialiased;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: var(--bg);
            transition: background 0.5s ease;
            overflow: hidden;
            pointer-events: none;
        }

        html.dark {
            --bg: #030303;
        }

        html:not(.dark) {
            --bg: #fcfcfc;
        }

        .blob {
            position: absolute;
            filter: blur(100px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 20s infinite alternate;
            will-change: transform;
            pointer-events: none;
        }

        html.dark .blob-1 {
            background: rgba(99, 102, 241, 0.12);
        }

        html.dark .blob-2 {
            background: rgba(168, 85, 247, 0.12);
        }

        html:not(.dark) .blob-1 {
            background: rgba(99, 102, 241, 0.2);
        }

        html:not(.dark) .blob-2 {
            background: rgba(168, 85, 247, 0.2);
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            min-width: 400px;
            min-height: 400px;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            min-width: 500px;
            min-height: 500px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(5%, 10%) scale(1.1);
            }
        }

        .profile-glow {
            position: absolute;
            inset: -20%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 60%);
            filter: blur(25px);
            z-index: -1;
            transition: opacity 0.5s;
            opacity: 0.6;
        }

        html:not(.dark) .profile-glow {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 60%);
        }
    </style>
</head>

<body
    class="bg-light text-gray-900 dark:bg-dark dark:text-white min-h-screen flex flex-col font-sans selection:bg-indigo-500/30">
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div id="root" class="flex-1 flex flex-col items-center justify-center p-6"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { motion, AnimatePresence } = window.Motion;

        const t = {
            th: { name: "ภูริทัต คำพมัย", msg: "กำลังสร้างบางอย่างที่ใหญ่กว่านี้" },
            en: { name: "Puritat Kampamai", msg: "Building something bigger" }
        };

        const App = () => {
            const [isDark, setIsDark] = useState(true);
            const [lang, setLang] = useState('th');
            const [mounted, setMounted] = useState(false);

            useEffect(() => {
                setMounted(true);
                const saved = localStorage.getItem('theme');
                setIsDark(saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
            }, []);

            useEffect(() => {
                if (!mounted) return;
                const root = document.documentElement;
                if (isDark) {
                    root.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    root.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDark, mounted]);

            if (!mounted) return null;
            const content = t[lang];

            return (
                <main className="w-full max-w-2xl flex flex-col items-center relative z-10">
                    <motion.div
                        initial={{ opacity: 0, y: -20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 0.8, ease: "easeOut" }}
                        className="fixed top-6 right-6 sm:top-8 sm:right-8 flex items-center gap-2 p-1.5 rounded-full border border-gray-200 dark:border-white/10 bg-white/50 dark:bg-black/20 backdrop-blur-md shadow-sm"
                    >
                        <button onClick={() => setLang(l => (l === 'th' ? 'en' : 'th'))} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-200/50 dark:hover:bg-white/10 text-xs font-semibold tracking-wider transition-colors">
                            {lang === 'th' ? 'EN' : 'TH'}
                        </button>
                        <div className="w-px h-4 bg-gray-300 dark:bg-white/20"></div>
                        <button onClick={() => setIsDark(d => !d)} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-200/50 dark:hover:bg-white/10 transition-colors">
                            <AnimatePresence mode="wait">
                                {isDark ? (
                                    <motion.svg key="moon" initial={{ opacity: 0, rotate: -90, scale: 0.5 }} animate={{ opacity: 1, rotate: 0, scale: 1 }} exit={{ opacity: 0, rotate: 90, scale: 0.5 }} transition={{ duration: 0.2 }} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></motion.svg>
                                ) : (
                                    <motion.svg key="sun" initial={{ opacity: 0, rotate: 90, scale: 0.5 }} animate={{ opacity: 1, rotate: 0, scale: 1 }} exit={{ opacity: 0, rotate: -90, scale: 0.5 }} transition={{ duration: 0.2 }} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></motion.svg>
                                )}
                            </AnimatePresence>
                        </button>
                    </motion.div>

                    <motion.div initial={{ scale: 0.8, opacity: 0, filter: "blur(10px)" }} animate={{ scale: 1, opacity: 1, filter: "blur(0px)" }} transition={{ duration: 1.2, ease: [0.16, 1, 0.3, 1] }} className="relative mb-8 mt-12 group">
                        <div className="profile-glow group-hover:opacity-100 transition-opacity duration-700"></div>
                        <div className="relative w-32 h-32 sm:w-40 sm:h-40 rounded-full p-[2px] bg-gradient-to-b from-gray-300 dark:from-white/20 to-transparent shadow-2xl">
                            <div className="w-full h-full rounded-full overflow-hidden bg-white dark:bg-black">
                                <img src="https://9namo.edgeone.app/IMG_20251227_190945_512.png" alt="Profile" className="w-full h-full object-cover transform transition-transform duration-1000 group-hover:scale-105" />
                            </div>
                        </div>
                    </motion.div>

                    <div className="flex flex-col items-center">
                        <div className="overflow-hidden pb-1 mb-4 text-center">
                            <motion.h1 key={lang + "-title"} initial={{ y: 40, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }} className="text-4xl sm:text-5xl md:text-6xl font-semibold tracking-tight text-gray-900 dark:text-white">
                                {content.name}
                            </motion.h1>
                        </div>

                        <motion.div className="h-px w-12 bg-gray-300 dark:bg-gray-700 rounded-full mb-6" initial={{ width: 0, opacity: 0 }} animate={{ width: 48, opacity: 1 }} transition={{ duration: 0.8, delay: 0.4 }} />

                        <div className="overflow-hidden text-center pb-2">
                            <motion.p key={lang + "-msg"} initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 0.8, delay: 0.1, ease: [0.16, 1, 0.3, 1] }} className="text-lg sm:text-xl md:text-2xl font-light text-gray-500 dark:text-gray-400 tracking-wide">
                                {content.msg}
                            </motion.p>
                        </div>
                    </div>
                </main>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
